<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus Chat | Premium Real-time Communication</title>
    <meta name="description"
        content="A high-performance, premium chat application with glassmorphism design and real-time syncing." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./style.css" />
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#6366f1" />

    <!-- iOS & Mobile Specific Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Nexus">
    <link rel="apple-touch-icon" href="https://api.dicebear.com/7.x/shapes/png?seed=Nexus&backgroundColor=6366f1">
    
    <!-- CSP to allow styles and scripts (Adding 'unsafe-inline' for the SW script) -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://esm.sh https://www.gstatic.com https://cdn.socket.io; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://www.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://api.dicebear.com; connect-src 'self' wss://*.onrender.com https://*.onrender.com;">
</head>

<body>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
    <div id="app">
        <div class="chat-container">
            <!-- Sidebar -->
            <aside class="sidebar">
                <header class="sidebar-header">
                    <h1>Nexus</h1>
                    <div class="status-indicator online"></div>
                </header>
                <div class="user-profile">
                    <div class="avatar-container">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="User Avatar"
                            id="user-avatar" />
                    </div>
                    <div class="user-info">
                        <span class="user-name" id="display-name">Guest</span>
                        <span class="user-status">Online</span>
                    </div>
                </div>
                <nav class="contacts">
                    <div class="sidebar-label">Usuarios en línea</div>
                    <div id="user-list">
                        <!-- Se llenará dinámicamente -->
                    </div>
                </nav>
            </aside>

            <!-- Main Chat Area -->
            <main class="chat-main">
                <header class="chat-header">
                    <button id="toggle-sidebar" class="mobile-only" title="Ver Usuarios">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                    </button>
                    <div class="header-info">
                        <h2>Global Chat</h2>
                        <span class="participant-count">Active Community</span>
                    </div>
                    <div class="header-actions">
                        <button id="export-chat" title="Descargar Historial">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3" />
                            </svg>
                        </button>
                        <button id="clear-chat" title="Limpiar Pantalla">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path
                                    d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" />
                            </svg>
                        </button>
                    </div>
                </header>

                <div class="messages-container" id="messages">
                    <div class="system-message">Iniciando conexión segura P2P...</div>
                </div>

                <div class="connection-info" id="conn-info">
                    ID de conexión: <span id="peer-id">...</span>
                </div>

                <footer class="chat-input-area">
                    <form id="chat-form">
                        <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off" />
                        <button type="submit" id="send-button" title="Enviar Mensaje">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </form>
                </footer>
            </main>
        </div>
    </div>

    <!-- Login/Overlay -->
    <div id="name-modal" class="modal">
        <div class="modal-content">
            <h3>Enter your Name</h3>
            <p>Welcome to Nexus. How should others see you?</p>
            <input type="text" id="username-entry" placeholder="Your name..." maxlength="20" />
            <button id="start-btn">Start Chatting</button>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script type="module" src="./main.js"></script>
</body>

</html>
