<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MAX Chat | Premium Real-time Communication</title>
    <meta name="description"
        content="A high-performance, premium chat application with glassmorphism design and real-time syncing." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./style.css" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#6366f1" />

    <!-- iOS & Mobile Specific Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MAX">
    <link rel="apple-touch-icon" href="/logo.png">
    
    <!-- CSP to allow styles and scripts -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://esm.sh https://www.gstatic.com https://cdn.socket.io; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://www.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://api.dicebear.com; connect-src 'self' wss://*.onrender.com https://*.onrender.com https://cdn.socket.io;">
</head>

<body>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
    <div id="app">
        <div class="chat-container">
            <!-- Sidebar -->
            <aside class="sidebar">
                <header class="sidebar-header">
                    <img src="/logo.png" alt="MAX Logo" class="main-logo" />
                    <div class="status-indicator online"></div>
                </header>
                <div class="user-profile">
                    <div class="avatar-container">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="User Avatar"
                            id="user-avatar" />
                    </div>
                    <div class="user-info">
                        <span class="user-name" id="display-name">Guest</span>
                        <span class="user-status">Online</span>
                    </div>
                    <button id="logout-btn" title="Salir / Cambiar Sala" style="background: none; border: none; color: var(--text-secondary); cursor: pointer; margin-left: auto;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    </button>
                </div>
                <nav class="contacts">
                    <div class="sidebar-label">Usuarios en línea</div>
                    <div id="user-list">
                        <!-- Se llenará dinámicamente -->
                    </div>
                </nav>
            </aside>

            <!-- Main Chat Area -->
            <main class="chat-main">
                <header class="chat-header">
                    <button id="toggle-sidebar" class="mobile-only" title="Ver Usuarios">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                    </button>
                    <div class="header-info">
                        <img src="/logo.png" alt="MAX" class="mobile-logo mobile-only" />
                        <h2 id="room-id">MAX Chat</h2>
                        <span class="participant-count">Active Community</span>
                    </div>
                    <div class="header-actions">
                        <button id="export-chat" title="Descargar Historial">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3" />
                            </svg>
                        </button>
                        <button id="clear-chat" title="Limpiar Pantalla">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path
                                    d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" />
                            </svg>
                        </button>
                    </div>
                </header>

                <div class="messages-container" id="messages">
                    <div class="system-message">Esperando conexión al servidor...</div>
                </div>

                <footer class="chat-input-area">
                    <form id="chat-form">
                        <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off" />
                        <button type="submit" id="send-button" title="Enviar Mensaje">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </form>
                </footer>
            </main>
        </div>
    </div>

    <!-- Login/Overlay -->
    <div id="name-modal" class="modal">
        <div class="modal-content">
            <h3>Bienvenido a MAX</h3>
            <p>Introduce tu nombre y el código de sala para entrar.</p>
            <input type="text" id="username-entry" placeholder="Tu nombre..." maxlength="20" />
            <input type="text" id="room-entry" placeholder="Introduce el código de sala" maxlength="10" />
            <button id="start-btn">Entrar al Chat</button>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script type="module" src="./main.js"></script>
</body>

</html>
